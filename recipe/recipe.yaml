{% set name = "wadler-lindig" %}
{% set version = "0.1.7" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_')}}-{{ version }}.tar.gz
  sha256: 81d14d3fe77d441acf3ebd7f4aefac20c74128bf460e84b512806dccf7b2cd55

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true  # [py<310]

requirements:
  host:
    - pip
    - python
    - hatchling
  run:
    - python

test:
  imports:
    - wadler_lindig
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/patrick-kidger/wadler_lindig
  summary: A Wadler–Lindig pretty-printer for Python.
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  description: |
    A Wadler–Lindig pretty-printer for Python.
  dev_url: https://github.com/patrick-kidger/wadler_lindig
  doc_url: https://github.com/patrick-kidger/wadler_lindig

extra:
  recipe-maintainers:
    - dhirschfeld
